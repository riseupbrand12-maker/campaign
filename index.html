<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GUPS PKDL | പ്രവേശനോത്സവം 2026 | Black Name Poster</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Anek Malayalam', 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a2f44, #134e6f);
            min-height: 100vh;
            padding: 32px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main poster card */
        .poster-card {
            max-width: 1320px;
            width: 100%;
            background: #fffef7;
            border-radius: 56px;
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 210, 120, 0.5);
            overflow: hidden;
        }

        .hero-header {
            text-align: center;
            padding: 28px 24px 20px;
            background: linear-gradient(120deg, #fff8ed, #fff3e0);
            border-bottom: 2px solid #ffdeae;
        }
        .hero-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #1f4b6e, #f7b42c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }
        .hero-header p {
            font-size: 1.2rem;
            font-weight: 600;
            color: #c6761a;
            margin-top: 8px;
        }

        .flex-studio {
            display: flex;
            flex-wrap: wrap;
        }

        /* LEFT PANEL */
        .controls-area {
            flex: 1.1;
            min-width: 290px;
            background: #fffbf2;
            padding: 32px 28px;
            border-right: 1px solid #ffebcf;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* RIGHT PANEL (poster preview) */
        .preview-area {
            flex: 1.2;
            background: #fef9f0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .input-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-block label {
            font-weight: 800;
            color: #2f577b;
            font-size: 1rem;
            letter-spacing: -0.2px;
        }
        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 60px;
            border: 2px solid #f4debc;
            background: white;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #f7b32b;
            box-shadow: 0 0 0 3px rgba(247,179,43,0.2);
        }

        /* upload section (appears after name) */
        .upload-section {
            transition: all 0.2s ease;
            background: #fef5e9;
            border-radius: 48px;
            padding: 20px 18px;
            border: 1px dashed #ffcd8c;
        }
        .file-label {
            background: #f3e5d3;
            padding: 14px 18px;
            border-radius: 60px;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
            border: 1px solid #e2cdab;
        }
        .file-label:hover {
            background: #eedcb9;
            transform: scale(1.01);
            border-color: #f7b32b;
        }
        #photoInput {
            display: none;
        }

        /* MODAL (NEW PAGE STYLE BOX) - ക്രോപ്പ് ടൂൾ */
        .crop-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.25s ease;
        }
        .crop-modal.active {
            display: flex;
        }
        .modal-box {
            background: #fffef5;
            border-radius: 48px;
            width: 90%;
            max-width: 750px;
            padding: 20px 20px 28px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.5);
            border: 1px solid #ffdfaa;
            transition: transform 0.2s;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0 8px 12px 16px;
            border-bottom: 2px solid #ffe1b3;
        }
        .modal-header h3 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(145deg, #cc7b2a, #e69c2e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .modal-close {
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: 600;
            color: #b97f3a;
            transition: 0.2s;
        }
        .modal-close:hover {
            color: #c0392b;
            transform: scale(1.1);
        }
        .crop-container {
            margin: 20px 0;
            background: #ece1cf;
            border-radius: 32px;
            overflow: hidden;
            max-height: 55vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .crop-container img {
            max-width: 100%;
            display: block;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 18px;
        }
        .btn-crop-save {
            background: #f7b32b;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1rem;
            color: #2c2e3a;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn-crop-save:hover {
            background: #e09d1a;
            transform: translateY(-2px);
        }
        .btn-cancel-crop {
            background: #e2d4c0;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            color: #5a3e1f;
            cursor: pointer;
        }

        /* poster canvas & download */
        .canvas-wrapper {
            background: #fff7e8;
            border-radius: 32px;
            box-shadow: 0 20px 32px rgba(0, 0, 0, 0.18);
            padding: 12px;
            max-width: 460px;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            background: #e8d9c4;
        }
        .download-btn {
            background: #1f8a4c;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }
        .download-btn:hover {
            background: #0f6a3a;
            transform: scale(1.02);
        }
        .footer-credit {
            font-size: 0.8rem;
            font-weight: 500;
            color: #b97f2e;
            background: #fff2e2;
            padding: 6px 18px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 8px;
            text-align: center;
        }
        .hidden {
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @media (max-width: 780px) {
            .controls-area {
                border-right: none;
                border-bottom: 1px solid #ffebcf;
            }
            .hero-header h1 {
                font-size: 1.5rem;
            }
            .modal-box {
                width: 95%;
                padding: 16px;
            }
            .modal-header h3 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div class="poster-card">
    <div class="hero-header">
        <h1>G.U.P.S പഴയകടയ്‌ക്കൽ</h1>
        <p>പ്രവേശനോത്സവം 2026</p>
    </div>

    <div class="flex-studio">
        <!-- LEFT PANEL : Name + photo upload trigger -->
        <div class="controls-area">
            <div class="input-block">
                <label>📝 നിങ്ങളുടെ പേര്</label>
                <input type="text" id="studentName" placeholder="ഉദാ: ഫാത്തിമ കെ / FATHIMA K" autocomplete="off">
                <div class="info-note" style="font-size:0.7rem; color:#b5762a;">* പേര് നൽകിയ ശേഷം ഫോട്ടോ അപ്ലോഡ് ചെയ്യാം</div>
            </div>

            <!-- Photo upload section (initially hidden until name has value) -->
            <div id="photoUploadWrapper" class="upload-section hidden">
                <div class="input-block">
                    <label>📸 ഫോട്ടോ അപ്ലോഡ് </label>
                    <div class="file-label" id="triggerFileSelect">
                        🖼️ ഫോട്ടോ തിരഞ്ഞെടുക്കുക
                    </div>
                    <input type="file" id="photoInput" accept="image/jpeg, image/png, image/jpg">
                </div>
                <div style="font-size:0.7rem; color:#b87c30; margin-top:8px; text-align:center;">
                    ✨ ആവശ്യാനുസരണം ഫോട്ടോ ക്രോപ്പ് ചെയ്യാവുന്നതാണ്.
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL : Poster preview and download -->
        <div class="preview-area">
            <div class="canvas-wrapper">
                <canvas id="posterCanvas" width="1200" height="1500" style="width:100%; height:auto; max-width:450px; border-radius: 24px;"></canvas>
            </div>
            <button id="downloadPosterBtn" class="download-btn">⬇️ പോസ്റ്റർ ഡൗൺലോഡ് ചെയ്യുക</button>
            <div class="footer-credit">© SUHAIL KERALA | RiseUp Brand | 7034678818</div>
        </div>
    </div>
</div>

<!-- MODAL : CROP TOOL - പുതിയ പേജ് പോലെ പ്രത്യേക ബോക്സ് -->
<div id="cropModal" class="crop-modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3>✂️ ഫോട്ടോ ക്രോപ്പ് ചെയ്യുക</h3>
            <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="crop-container" id="cropImageContainer">
            <img id="modalCropImage" style="max-width:100%; display:block;">
        </div>
        <div class="modal-buttons">
            <button id="modalCancelBtn" class="btn-cancel-crop">❌ റദ്ദാക്കുക</button>
            <button id="modalCropSaveBtn" class="btn-crop-save">✔️ ക്രോപ്പ് & സേവ് ചെയ്യുക</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ----- DOM elements -----
        const nameInput = document.getElementById('studentName');
        const photoUploadWrapper = document.getElementById('photoUploadWrapper');
        const photoFileInput = document.getElementById('photoInput');
        const triggerFileSelect = document.getElementById('triggerFileSelect');
        
        // Modal & cropper related
        const cropModal = document.getElementById('cropModal');
        const modalCropImg = document.getElementById('modalCropImage');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const modalCancelBtn = document.getElementById('modalCancelBtn');
        const modalCropSaveBtn = document.getElementById('modalCropSaveBtn');
        
        const posterCanvas = document.getElementById('posterCanvas');
        const ctx = posterCanvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadPosterBtn');
        
        // state variables
        let cropperInstance = null;
        let currentCroppedImage = null;      // final image object after crop & save
        let backgroundImage = new Image();
        let bgReady = false;
        let currentSelectedFile = null;
        
        // Poster constants
        const PHOTO_SIZE = 420;
        const RIGHT_MARGIN = 80;
        const photoX = posterCanvas.width - PHOTO_SIZE - RIGHT_MARGIN; // 1200-420-80=700
        const PHOTO_Y = 470;
        const NAME_GAP_BELOW_PHOTO = 70;
        const nameCenterX = photoX + PHOTO_SIZE / 2;
        const nameBaseY = PHOTO_Y + PHOTO_SIZE + NAME_GAP_BELOW_PHOTO;
        const BG_IMAGE_URL = 'https://i.ibb.co/kggbJK3V/KERALA.jpg';
        
        // helper: rounded rect for photo frame
        function roundedRect(ctx, x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }
        
        // draw poster with background, cropped photo and name
        // NAME PRINT IN BLACK COLOUR with crisp white shadow for readability
        function drawFullPoster() {
            if (!ctx) return;
            const w = posterCanvas.width;
            const h = posterCanvas.height;
            
            // draw background image or gradient fallback
            if (bgReady && backgroundImage.complete && backgroundImage.naturalWidth > 0) {
                ctx.drawImage(backgroundImage, 0, 0, w, h);
            } else {
                const grad = ctx.createLinearGradient(0, 0, w, h);
                grad.addColorStop(0, '#1d5b85');
                grad.addColorStop(0.6, '#f5b042');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, w, h);
            }
            
            const radius = 44;
            // Draw photo (if available)
            if (currentCroppedImage && currentCroppedImage.complete && currentCroppedImage.naturalWidth) {
                ctx.save();
                ctx.beginPath();
                roundedRect(ctx, photoX, PHOTO_Y, PHOTO_SIZE, PHOTO_SIZE, radius);
                ctx.clip();
                ctx.drawImage(currentCroppedImage, photoX, PHOTO_Y, PHOTO_SIZE, PHOTO_SIZE);
                ctx.restore();
                
                // elegant double border
                ctx.beginPath();
                roundedRect(ctx, photoX, PHOTO_Y, PHOTO_SIZE, PHOTO_SIZE, radius);
                ctx.lineWidth = 4;
                ctx.strokeStyle = "#F7C873";
                ctx.stroke();
                ctx.beginPath();
                roundedRect(ctx, photoX+2, PHOTO_Y+2, PHOTO_SIZE-4, PHOTO_SIZE-4, radius-2);
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = "#FFF9E6";
                ctx.stroke();
            } else {
                // placeholder: empty frame with camera icon
                ctx.fillStyle = "rgba(250, 240, 210, 0.9)";
                ctx.beginPath();
                roundedRect(ctx, photoX, PHOTO_Y, PHOTO_SIZE, PHOTO_SIZE, radius);
                ctx.fill();
                ctx.fillStyle = "#b57c34";
                ctx.font = "68px 'Anek Malayalam'";
                ctx.textAlign = "center";
                ctx.fillText("📷", photoX + PHOTO_SIZE/2, PHOTO_Y + PHOTO_SIZE/2 + 8);
                ctx.textAlign = "left";
                ctx.beginPath();
                roundedRect(ctx, photoX, PHOTO_Y, PHOTO_SIZE, PHOTO_SIZE, radius);
                ctx.strokeStyle = "#e5bf86";
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            
            // draw name below photo -  NAME PRINT IN BLACK COLOUR as requested
            // Using pure black (#000000) with soft white halo/shadow for excellent visibility on any background
            let studentName = nameInput.value.trim();
            if (studentName === "") {
                studentName = "__________";
            }
            let maxNameWidth = PHOTO_SIZE + 70;
            let fontSize = 54;
            ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
            let textWidth = ctx.measureText(studentName).width;
            while (textWidth > maxNameWidth && fontSize > 28) {
                fontSize -= 4;
                ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
                textWidth = ctx.measureText(studentName).width;
            }
            ctx.save();
            // Strong white glow behind the black text for ultimate contrast and readability
            ctx.shadowColor = "rgba(255, 255, 230, 0.95)";
            ctx.shadowBlur = 5;
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 1;
            // Secondary subtle dark shadow for depth? Actually using white shadow gives black text a "pop" effect
            ctx.fillStyle = "#000000";   // BLACK COLOUR as specified
            ctx.textAlign = "center";
            ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
            ctx.fillText(studentName, nameCenterX, nameBaseY);
            
            // Optional: extra stroke effect to ensure black text stands out even on dark regions
            // We add a very thin white stroke behind (by drawing twice with no shadow but stroke? but white shadow already helps)
            // For extra crispness, we re-draw the same text with no shadow but white outline? Not needed as shadow works perfectly.
            ctx.restore();
        }
        
        // set cropped image from canvas dataURL
        function setCroppedImageFromCanvas(canvasElement) {
            const img = new Image();
            img.onload = () => {
                currentCroppedImage = img;
                drawFullPoster();
            };
            img.src = canvasElement.toDataURL('image/png');
        }
        
        // destroy cropper and close modal
        function closeCropModal(resetFileInput = true) {
            if (cropperInstance) {
                cropperInstance.destroy();
                cropperInstance = null;
            }
            cropModal.classList.remove('active');
            if (resetFileInput) {
                photoFileInput.value = '';
            }
            // clear modal image src to avoid flicker
            modalCropImg.src = '';
        }
        
        // open modal with image file, init cropper
        function openCropModalWithFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                modalCropImg.src = e.target.result;
                // ensure modal is visible before cropper init
                cropModal.classList.add('active');
                // wait for image load
                modalCropImg.onload = () => {
                    if (cropperInstance) {
                        cropperInstance.destroy();
                    }
                    cropperInstance = new Cropper(modalCropImg, {
                        aspectRatio: 1,
                        viewMode: 2,
                        dragMode: 'move',
                        autoCropArea: 0.9,
                        cropBoxMovable: true,
                        cropBoxResizable: true,
                        zoomable: true,
                        background: true,
                        responsive: true,
                        center: true,
                    });
                };
                if (modalCropImg.complete) {
                    modalCropImg.onload();
                }
            };
            reader.readAsDataURL(file);
        }
        
        // handle file selection: open modal crop box (new page style)
        function onPhotoSelected(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                alert("ദയവായി ഒരു ചിത്രം തിരഞ്ഞെടുക്കുക (JPEG/PNG)");
                photoFileInput.value = '';
                return;
            }
            currentSelectedFile = file;
            openCropModalWithFile(file);
        }
        
        // crop & save logic: get cropped canvas and update poster
        function saveCroppedImage() {
            if (!cropperInstance) {
                alert("ക്രോപ്പ് ടൂൾ പ്രവർത്തന സജ്ജമല്ല, വീണ്ടും ശ്രമിക്കുക");
                closeCropModal(true);
                return;
            }
            const croppedCanvas = cropperInstance.getCroppedCanvas({ width: 800, height: 800 });
            if (!croppedCanvas) {
                alert("ക്രോപ്പ് ചെയ്യുന്നതിൽ പിശക്, ദയവായി വീണ്ടും ശ്രമിക്കുക");
                return;
            }
            // update final poster image
            setCroppedImageFromCanvas(croppedCanvas);
            // close modal and reset file input
            closeCropModal(true);
        }
        
        // cancel cropping: just close modal without saving
        function cancelCropping() {
            closeCropModal(true);
        }
        
        // ----- Name input logic: show/hide photo upload section (only if name non-empty)
        function toggleUploadSection() {
            const nameValue = nameInput.value.trim();
            if (nameValue.length > 0) {
                if (photoUploadWrapper.classList.contains('hidden')) {
                    photoUploadWrapper.classList.remove('hidden');
                }
            } else {
                if (!photoUploadWrapper.classList.contains('hidden')) {
                    photoUploadWrapper.classList.add('hidden');
                }
                // If no name, we keep poster with placeholder but don't force photo removal
            }
            drawFullPoster();   // update poster name text
        }
        
        // also trigger when name changes
        function onNameChange() {
            toggleUploadSection();
            drawFullPoster();
        }
        
        // load background
        function initBackground() {
            backgroundImage.crossOrigin = "Anonymous";
            backgroundImage.onload = () => {
                bgReady = true;
                drawFullPoster();
            };
            backgroundImage.onerror = () => {
                console.warn("Background image fallback");
                bgReady = true;
                drawFullPoster();
            };
            backgroundImage.src = BG_IMAGE_URL;
        }
        
        // download poster
        function downloadPoster() {
            const nameForFile = (nameInput.value.trim() || "poster").replace(/[^a-zA-Z0-9\u0D00-\u0D7F]/g, '_');
            const filename = `GUPS_${nameForFile}.png`;
            posterCanvas.toBlob((blob) => {
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }, 'image/png');
        }
        
        // ----- Event bindings ----
        nameInput.addEventListener('input', onNameChange);
        nameInput.addEventListener('blur', () => drawFullPoster());
        triggerFileSelect.addEventListener('click', (e) => {
            e.preventDefault();
            const nameExists = nameInput.value.trim().length > 0;
            if (!nameExists) {
                alert("ദയവായി ആദ്യം നിങ്ങളുടെ പേര് രേഖപ്പെടുത്തുക");
                return;
            }
            photoFileInput.click();
        });
        photoFileInput.addEventListener('change', onPhotoSelected);
        
        // modal buttons
        modalCropSaveBtn.addEventListener('click', saveCroppedImage);
        modalCancelBtn.addEventListener('click', cancelCropping);
        closeModalBtn.addEventListener('click', cancelCropping);
        
        // close modal if click on overlay (optional)
        cropModal.addEventListener('click', (e) => {
            if (e.target === cropModal) {
                cancelCropping();
            }
        });
        
        downloadBtn.addEventListener('click', downloadPoster);
        
        // additional: when we close modal by any reason, destroy cropper safely
        window.addEventListener('resize', () => drawFullPoster());
        
        // initialize background and draw placeholder poster
        initBackground();
        // initial hide upload section & draw empty poster
        toggleUploadSection();
        drawFullPoster();
        
        // Ensure that if user re-opens modal after a cropped image exists, old cropper removed
        function finalCleanup() {
            if (cropperInstance) {
                cropperInstance.destroy();
                cropperInstance = null;
            }
        }
        
        // Override close to fully destroy - handled
    })();
</script>
</body>
</html>

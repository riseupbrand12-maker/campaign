<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GUPS PKDL | പ്രവേശനോത്സവം 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Anek Malayalam', 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a2f44, #134e6f);
            min-height: 100vh;
            padding: 32px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .poster-card {
            max-width: 1320px;
            width: 100%;
            background: #fffef7;
            border-radius: 56px;
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 210, 120, 0.5);
            overflow: hidden;
        }

        .hero-header {
            text-align: center;
            padding: 28px 24px 20px;
            background: linear-gradient(120deg, #fff8ed, #fff3e0);
            border-bottom: 2px solid #ffdeae;
        }
        .hero-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #1f4b6e, #f7b42c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }
        .hero-header p {
            font-size: 1.2rem;
            font-weight: 600;
            color: #c6761a;
            margin-top: 8px;
        }

        .flex-studio {
            display: flex;
            flex-wrap: wrap;
        }
        .controls-area {
            flex: 1.1;
            min-width: 290px;
            background: #fffbf2;
            padding: 32px 28px;
            border-right: 1px solid #ffebcf;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .preview-area {
            flex: 1.2;
            background: #fef9f0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .input-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-block label {
            font-weight: 800;
            color: #2f577b;
            font-size: 1rem;
            letter-spacing: -0.2px;
        }
        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 60px;
            border: 2px solid #f4debc;
            background: white;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #f7b32b;
            box-shadow: 0 0 0 3px rgba(247,179,43,0.2);
        }

        .upload-section {
            transition: all 0.2s ease;
            background: #fef5e9;
            border-radius: 48px;
            padding: 20px 18px;
            border: 1px dashed #ffcd8c;
        }
        .file-label {
            background: #f3e5d3;
            padding: 14px 18px;
            border-radius: 60px;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
            border: 1px solid #e2cdab;
        }
        .file-label:hover {
            background: #eedcb9;
            transform: scale(1.01);
            border-color: #f7b32b;
        }
        #photoInput {
            display: none;
        }

        .cropper-card {
            background: #ffffffea;
            border-radius: 32px;
            padding: 18px;
            border: 1px solid #ffd89a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-top: 4px;
        }
        .cropper-title {
            font-weight: 700;
            margin-bottom: 12px;
            color: #bf721a;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #cropImageContainer img {
            max-width: 100%;
            display: block;
            border-radius: 24px;
        }
        .btn-group-crop {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }
        .btn {
            border: none;
            background: #2f4d70;
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: #f7b32b;
            color: #2c2e3a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .btn-primary:hover {
            background: #e09d1a;
            transform: translateY(-2px);
        }
        .btn-outline {
            background: #e9e2d4;
            color: #5a3e1f;
        }

        .canvas-wrapper {
            background: #fff7e8;
            border-radius: 32px;
            box-shadow: 0 20px 32px rgba(0, 0, 0, 0.18);
            padding: 12px;
            max-width: 460px;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 24px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            background: #e8d9c4;
        }
        .download-btn {
            background: #1f8a4c;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }
        .download-btn:hover {
            background: #0f6a3a;
            transform: scale(1.02);
        }
        .footer-credit {
            font-size: 0.8rem;
            font-weight: 500;
            color: #b97f2e;
            background: #fff2e2;
            padding: 6px 18px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 8px;
            text-align: center;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 780px) {
            .controls-area {
                border-right: none;
                border-bottom: 1px solid #ffebcf;
            }
            .hero-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="poster-card">
    <div class="hero-header">
        <h1>G.U.P.S പഴയകടക്കൽ</h1>
        <p>🌾 പ്രവേശനോത്സവം 2026 🌾</p>
    </div>

    <div class="flex-studio">
        <!-- LEFT PANEL: name + photo upload (conditional) + cropper -->
        <div class="controls-area">
            <div class="input-block">
                <label>📝 നിങ്ങളുടെ പേര്</label>
                <input type="text" id="studentName" placeholder="ഉദാ: ഫാത്തിമ കെ/FATHIMA K" autocomplete="off">
            </div>

            <!-- Photo upload section (hidden until name is typed) -->
            <div id="photoUploadWrapper" class="upload-section hidden">
                <div class="input-block">
                    <label>📸 ഫോട്ടോ അപ്ലോഡ്</label>
                    <div class="file-label" onclick="document.getElementById('photoInput').click()">
                        🖼️ ഫോട്ടോ തിരഞ്ഞെടുക്കുക
                    </div>
                    <input type="file" id="photoInput" accept="image/jpeg, image/png, image/jpg">
                </div>
            </div>

            <!-- Cropper panel (appears after image selection) -->
            <div id="cropperPanel" class="cropper-card hidden">
                <div class="cropper-title">✂️ ഫോട്ടോ ക്രോപ്പ് ചെയ്യുക</div>
                <div id="cropImageContainer" style="background:#f5ede1; border-radius: 24px; overflow: hidden;">
                    <img id="cropPreviewImg" style="display: block; max-width: 100%; width: 100%;">
                </div>
                <div class="btn-group-crop">
                    <button id="applyCropBtn" class="btn btn-primary">✔️ ക്രോപ്പ് & സേവ് ചെയ്യുക</button>
                    <button id="cancelCropBtn" class="btn btn-outline">❌ ഒഴിവാക്കുക</button>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL: poster preview + download + footer below button -->
        <div class="preview-area">
            <div class="canvas-wrapper">
                <canvas id="posterCanvas" width="1200" height="1500" style="width:100%; height:auto; max-width:450px; border-radius: 24px;"></canvas>
            </div>
            <button id="downloadPosterBtn" class="download-btn">⬇️ പോസ്റ്റർ ഡൗൺലോഡ് ചെയ്യുക</button>
            <div class="footer-credit">© RiseUp Brand| SUHAIL KERALA</div>
        </div>
    </div>
</div>

<script>
    // ---------- Poster Generation Logic ----------
    // 1. Name input reveals photo upload option.
    // 2. Upload photo → mandatory square crop before use.
    // 3. Poster contains: background + cropped photo (right side, 420px) + name below photo (white, centered, no underline)
    // 4. No extra text, info boxes removed. Footer placed below download button.
    
    const nameInput = document.getElementById('studentName');
    const photoUploadWrapper = document.getElementById('photoUploadWrapper');
    const photoFileInput = document.getElementById('photoInput');
    const cropperPanel = document.getElementById('cropperPanel');
    const cropImageElem = document.getElementById('cropPreviewImg');
    const applyCropBtn = document.getElementById('applyCropBtn');
    const cancelCropBtn = document.getElementById('cancelCropBtn');
    const posterCanvas = document.getElementById('posterCanvas');
    const ctx = posterCanvas.getContext('2d');
    const downloadBtn = document.getElementById('downloadPosterBtn');
    
    let cropperInstance = null;
    let currentCroppedImage = null;      // final image after crop
    let backgroundImage = new Image();
    let bgReady = false;
    
    // Poster dimensions & layout
    const PHOTO_SIZE = 420;
    const RIGHT_MARGIN = 80;
    const photoX = posterCanvas.width - PHOTO_SIZE - RIGHT_MARGIN; // 700
    const PHOTO_Y = 470;
    const NAME_GAP_BELOW_PHOTO = 70;
    const nameCenterX = photoX + PHOTO_SIZE / 2;
    const nameBaseY = PHOTO_Y + PHOTO_SIZE + NAME_GAP_BELOW_PHOTO;
    
    const BG_IMAGE_URL = 'https://i.ibb.co/BRG70Zs/KERALA.jpg';
    
    // Helper: rounded rectangle
    function roundedRect(ctx, x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }
    
    // Draw full poster: background + photo + name
    function drawFullPoster() {
        if (!ctx) return;
        const w = posterCanvas.width;
        const h = posterCanvas.height;
        
        // 1. Background
        if (bgReady && backgroundImage.complete && backgroundImage.naturalWidth > 0) {
            ctx.drawImage(backgroundImage, 0, 0, w, h);
        } else {
            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, '#1d5b85');
            grad.addColorStop(0.6, '#f5b042');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
        }
        
        // 2. Right side photo (rounded corners, border)
        const radius = 44;
        if (currentCroppedImage && currentCroppedImage.complete && currentCroppedImage.naturalWidth) {
            ctx.save();
            ctx.beginPath();
            roundedRect(ctx, photoX, PHOTO_Y, PHOTO_SIZE, PHOTO_SIZE, radius);
            ctx.clip();
            ctx.drawImage(currentCroppedImage, photoX, PHOTO_Y, PHOTO_SIZE, PHOTO_SIZE);
            ctx.restore();
            
            // double border
            ctx.beginPath();
            roundedRect(ctx, photoX, PHOTO_Y, PHOTO_SIZE, PHOTO_SIZE, radius);
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#F7C873";
            ctx.stroke();
            ctx.beginPath();
            roundedRect(ctx, photoX+2, PHOTO_Y+2, PHOTO_SIZE-4, PHOTO_SIZE-4, radius-2);
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = "#FFF9E6";
            ctx.stroke();
        } else {
            // placeholder (empty frame with subtle icon)
            ctx.fillStyle = "rgba(250, 240, 210, 0.9)";
            ctx.beginPath();
            roundedRect(ctx, photoX, PHOTO_Y, PHOTO_SIZE, PHOTO_SIZE, radius);
            ctx.fill();
            ctx.fillStyle = "#b57c34";
            ctx.font = "68px 'Anek Malayalam'";
            ctx.textAlign = "center";
            ctx.fillText("📷", photoX + PHOTO_SIZE/2, PHOTO_Y + PHOTO_SIZE/2 + 8);
            ctx.textAlign = "left";
            ctx.beginPath();
            roundedRect(ctx, photoX, PHOTO_Y, PHOTO_SIZE, PHOTO_SIZE, radius);
            ctx.strokeStyle = "#e5bf86";
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        
        // 3. Name below photo (white, centered, dynamic size)
        let studentName = nameInput.value.trim();
        if (studentName === "") {
            studentName = "__________";
        }
        let maxNameWidth = PHOTO_SIZE + 70;
        let fontSize = 54;
        ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
        let textWidth = ctx.measureText(studentName).width;
        while (textWidth > maxNameWidth && fontSize > 28) {
            fontSize -= 4;
            ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
            textWidth = ctx.measureText(studentName).width;
        }
        ctx.save();
        ctx.shadowColor = "rgba(0, 0, 0, 0.65)";
        ctx.shadowBlur = 8;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
        ctx.fillStyle = "#FFFFFF";
        ctx.textAlign = "center";
        ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
        ctx.fillText(studentName, nameCenterX, nameBaseY);
        ctx.restore();
    }
    
    // Set cropped image from dataURL
    function setCroppedImageFromDataURL(dataURL) {
        const img = new Image();
        img.onload = () => {
            currentCroppedImage = img;
            drawFullPoster();
        };
        img.src = dataURL;
    }
    
    // Destroy cropper and hide panel
    function destroyCropperAndReset() {
        if (cropperInstance) {
            cropperInstance.destroy();
            cropperInstance = null;
        }
        cropperPanel.classList.add('hidden');
        cropImageElem.src = "";
        photoFileInput.value = "";
    }
    
    // Handle file selection: show cropper
    photoFileInput.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            alert("ദയവായി ഒരു ചിത്രം തിരഞ്ഞെടുക്കുക");
            photoFileInput.value = "";
            return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            cropImageElem.src = e.target.result;
            cropperPanel.classList.remove('hidden');
            if (cropperInstance) cropperInstance.destroy();
            cropperInstance = new Cropper(cropImageElem, {
                aspectRatio: 1,
                viewMode: 2,
                dragMode: 'move',
                autoCropArea: 0.9,
                cropBoxMovable: true,
                cropBoxResizable: true,
                zoomable: true,
                background: true,
                responsive: true,
            });
        };
        reader.readAsDataURL(file);
    });
    
    // Apply crop and update poster
    applyCropBtn.addEventListener('click', () => {
        if (!cropperInstance) {
            alert("ക്രോപ്പ് ടൂൾ ലഭ്യമല്ല, വീണ്ടും ഫോട്ടോ തിരഞ്ഞെടുക്കുക");
            return;
        }
        const croppedCanvas = cropperInstance.getCroppedCanvas({ width: 800, height: 800 });
        if (!croppedCanvas) {
            alert("ക്രോപ്പ് ചെയ്യാൻ കഴിഞ്ഞില്ല");
            return;
        }
        const croppedDataURL = croppedCanvas.toDataURL('image/png');
        setCroppedImageFromDataURL(croppedDataURL);
        destroyCropperAndReset();
    });
    
    // Cancel crop
    cancelCropBtn.addEventListener('click', () => {
        destroyCropperAndReset();
    });
    
    // Name input handler: show/hide photo upload + redraw poster
    function handleNameChange() {
        const nameExists = nameInput.value.trim().length > 0;
        if (nameExists) {
            if (photoUploadWrapper.classList.contains('hidden')) {
                photoUploadWrapper.classList.remove('hidden');
            }
        } else {
            if (!photoUploadWrapper.classList.contains('hidden')) {
                photoUploadWrapper.classList.add('hidden');
                if (cropperPanel && !cropperPanel.classList.contains('hidden')) {
                    destroyCropperAndReset();
                }
            }
        }
        drawFullPoster();
    }
    
    nameInput.addEventListener('input', handleNameChange);
    nameInput.addEventListener('blur', () => drawFullPoster());
    
    // Background image loading
    function initBackground() {
        backgroundImage.crossOrigin = "Anonymous";
        backgroundImage.onload = () => {
            bgReady = true;
            drawFullPoster();
        };
        backgroundImage.onerror = () => {
            bgReady = true;
            drawFullPoster();
        };
        backgroundImage.src = BG_IMAGE_URL;
    }
    
    // Download poster as PNG
    downloadBtn.addEventListener('click', () => {
        const nameForFile = (nameInput.value.trim() || "poster").replace(/[^a-zA-Z0-9\u0D00-\u0D7F]/g, '_');
        const filename = `GUPS_${nameForFile}.png`;
        posterCanvas.toBlob((blob) => {
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }, 'image/png');
    });
    
    // If user re-selects while cropper open, destroy previous
    photoFileInput.addEventListener('click', () => {
        if (cropperInstance && !cropperPanel.classList.contains('hidden')) {
            destroyCropperAndReset();
        }
    });
    
    window.addEventListener('resize', () => drawFullPoster());
    
    initBackground();
    drawFullPoster();
    handleNameChange();  // ensures upload section hidden initially
</script>
</body>
</html>

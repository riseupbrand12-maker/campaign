<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GUPS PKDL | പ്രവേശനോത്സവം 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Anek Malayalam', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f2d44 0%, #1b4d6e 100%);
            min-height: 100vh;
            padding: 40px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .poster-studio {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 56px;
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255,215,150,0.3);
            overflow: hidden;
        }

        .web-heading {
            text-align: center;
            padding: 28px 24px 20px 24px;
            background: linear-gradient(to bottom, #fffbf0, #fff7e8);
            border-bottom: 2px solid #ffe0b5;
        }

        .web-heading h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72, #f7b32b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .web-heading p {
            font-size: 1.2rem;
            color: #c97e2a;
            font-weight: 600;
            margin-top: 6px;
        }

        .style-note {
            background: #fdefd4;
            border-radius: 60px;
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #a65311;
            display: inline-block;
            margin-top: 12px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 2px 5px rgba(0,0,0,0.05);
        }

        .studio-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
        }

        /* Left controls panel */
        .controls-panel {
            flex: 1;
            min-width: 300px;
            background: #fffbf4;
            padding: 32px 28px;
            border-right: 1px solid #ffe6c7;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group label {
            font-weight: 700;
            color: #2c4763;
            font-size: 1.05rem;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input, .file-label {
            width: 100%;
            padding: 14px 20px;
            border-radius: 48px;
            border: 1.5px solid #ecdcaa;
            background: white;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            font-weight: 500;
        }

        input:focus {
            border-color: #f7b32b;
            box-shadow: 0 0 0 3px rgba(247,179,43,0.2);
        }

        .file-label {
            background: #f9efdf;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .file-label:hover {
            background: #f3e5cf;
            transform: scale(1.01);
            border-color: #f7b32b;
        }

        #photoInput {
            display: none;
        }

        /* Cropper section - now placed at the top after name input */
        .cropper-area {
            background: #ffffffea;
            border-radius: 36px;
            padding: 18px;
            border: 1px solid #ffd89a;
            box-shadow: 0 12px 22px rgba(0,0,0,0.08);
            margin-top: 0;
        }

        .cropper-title {
            font-weight: 700;
            margin-bottom: 12px;
            color: #c97e2a;
            font-size: 0.95rem;
        }

        .btn {
            border: none;
            background: #2c3e66;
            color: white;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            margin-right: 12px;
            transition: 0.2s;
        }

        .btn-primary {
            background: #f7b32b;
            color: #2c2e3a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            background: #e09d1a;
            transform: translateY(-2px);
        }

        .info-badge {
            background: #eef3fc;
            border-radius: 40px;
            padding: 12px 16px;
            text-align: center;
            font-size: 0.8rem;
            color: #2c4763;
            font-weight: 500;
            border: 1px solid #dce5f0;
        }

        /* Right preview panel */
        .preview-panel {
            flex: 1.2;
            background: #f4f7fd;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Preview heading below main header */
        .preview-heading {
            width: 100%;
            text-align: center;
            margin-bottom: 8px;
        }
        .preview-heading h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #2c4763;
            background: rgba(255,245,200,0.6);
            display: inline-block;
            padding: 6px 24px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        .poster-wrapper {
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            padding: 12px;
            max-width: 480px;
            width: 100%;
            display: flex;
            justify-content: center;
            transition: all 0.2s;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
            background: #eee;
        }

        .download-btn {
            background: #1f8a4c;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.15);
        }

        .download-btn:hover {
            background: #0f6a3a;
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(0,0,0,0.2);
        }

        @media (max-width: 850px) {
            .studio-grid {
                flex-direction: column;
            }
            .controls-panel {
                border-right: none;
                border-bottom: 1px solid #ffe6c7;
            }
            .poster-wrapper {
                max-width: 380px;
            }
            .web-heading h1 {
                font-size: 1.5rem;
            }
        }

        .btn, .file-label, .download-btn {
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>
<div class="poster-studio">
    <div class="web-heading">
        <h1>GUP SCHOOL PAZHAYAKADAKKAL</h1>
        <p>✨ പ്രവേശനോത്സവം ✨</p>
        <div class="style-note">📸 പേരും ഫോട്ടോയും നല്‍കുക.</div>
    </div>
    <div class="studio-grid">
        <div class="controls-panel">
            <!-- Name input -->
            <div class="input-group">
                <label>📝 നിങ്ങളുടെ പേര് / Your Name</label>
                <input type="text" id="studentNameInput" placeholder="e.g. NIDHA / നിദ" autocomplete="off">
            </div>

            <!-- Cropper section (appears after photo selection, but placed at top for accessibility) -->
            <div class="cropper-area" id="cropperSection" style="display: none;">
                <div class="cropper-title">✂️ ക്രോപ്പ് ചെയ്യുക (square crop)</div>
                <div id="cropImageContainer"><img id="cropImage" style="max-width:100%"></div>
                <div class="crop-actions" style="margin-top: 12px;">
                    <button class="btn btn-primary" id="applyCropBtn">✔️ ക്രോപ്പ് & സേവ് ചെയ്യുക.</button>
                    <button class="btn" id="cancelCropBtn">Cancel</button>
                </div>
            </div>

            <!-- Photo upload -->
            <div class="input-group">
                <label>📸 ഫോട്ടോ അപ്ലോഡ് ചെയ്യുക</label>
                <div class="file-label" onclick="document.getElementById('photoInput').click()">📁 ഫോട്ടോ തിരഞ്ഞെടുക്കുക / Choose photo</div>
                <input type="file" id="photoInput" accept="image/*">
            </div>

            <div class="info-badge">
                © SUHAIL KERALA | 7034678818
            </div>
        </div>
        <div class="preview-panel">
            <!-- Preview heading just below header section -->
            <div class="preview-heading">
                <h3>📌 പോസ്റ്റർ പ്രിവ്യൂ</h3>
            </div>
            <div class="poster-wrapper"><canvas id="posterCanvas" width="1200" height="1500"></canvas></div>
            <button id="downloadPosterBtn" class="download-btn">⬇️ പോസ്റ്റർ ഡൗൺലോഡ് ചെയ്യുക</button>
        </div>
    </div>
</div>

<script>
    // ==============================================================
    // FINAL: ONLY background + photo (right side) + name below photo
    // - Crop button section appears near the top (after name input)
    // - Preview heading placed below main header section
    // - Font size reduced, name white, no underline, no extra text
    // - Photo reduced size (420px)
    // ==============================================================

    const bgImageURL = 'https://i.ibb.co/BRG70Zs/KERALA.jpg';
    const canvas = document.getElementById('posterCanvas');
    const ctx = canvas.getContext('2d');
    const nameInput = document.getElementById('studentNameInput');
    const photoInput = document.getElementById('photoInput');
    const cropperSection = document.getElementById('cropperSection');
    const cropImage = document.getElementById('cropImage');
    const applyCrop = document.getElementById('applyCropBtn');
    const cancelCrop = document.getElementById('cancelCropBtn');
    
    let cropper = null;
    let currentPhoto = null;
    let background = new Image();
    let bgReady = false;
    
    // Constants for right-aligned photo (reduced size 420px)
    const PHOTO_SIZE = 420;
    const RIGHT_MARGIN = 80;
    const photoX = canvas.width - PHOTO_SIZE - RIGHT_MARGIN;   // 700px
    const PHOTO_Y = 470;
    const NAME_GAP_BELOW_PHOTO = 80;     // slightly lower
    const nameCenterX = photoX + PHOTO_SIZE / 2;
    const nameY = PHOTO_Y + PHOTO_SIZE + NAME_GAP_BELOW_PHOTO;
    
    // Rounded rectangle helper
    function roundedRect(ctx, x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }
    
    // Draw name below photo: white, centered, smaller font, NO underline
    function drawNameBelowPhoto(studentName) {
        if (!studentName || studentName.trim() === "") {
            studentName = "__________";
        }
        
        let maxAllowedWidth = PHOTO_SIZE + 60;
        let fontSize = 52;   // reduced size
        ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
        let textWidth = ctx.measureText(studentName).width;
        while (textWidth > maxAllowedWidth && fontSize > 24) {
            fontSize -= 4;
            ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
            textWidth = ctx.measureText(studentName).width;
        }
        
        ctx.save();
        ctx.shadowColor = "rgba(0, 0, 0, 0.85)";
        ctx.shadowBlur = 10;
        ctx.shadowOffsetX = 3;
        ctx.shadowOffsetY = 3;
        ctx.fillStyle = "#FFFFFF";
        ctx.textAlign = "center";
        ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
        ctx.fillText(studentName, nameCenterX, nameY);
        ctx.restore();
    }
    
    // MAIN DRAW: only background + photo + name (no extra text)
    function drawPoster() {
        if (!ctx) return;
        const w = canvas.width;
        const h = canvas.height;
        
        // 1. Background (full poster image or gradient fallback)
        if (bgReady && background.complete && background.naturalWidth) {
            ctx.drawImage(background, 0, 0, w, h);
        } else {
            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, '#153e5c');
            grad.addColorStop(0.5, '#f3a22e');
            grad.addColorStop(1, '#e1b158');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
        }
        
        // 2. Right side photo (reduced 420px)
        const cornerRadius = 48;
        const photoBoxX = photoX;
        const photoBoxY = PHOTO_Y;
        
        if (currentPhoto && currentPhoto.complete && currentPhoto.naturalWidth) {
            ctx.save();
            ctx.beginPath();
            roundedRect(ctx, photoBoxX, photoBoxY, PHOTO_SIZE, PHOTO_SIZE, cornerRadius);
            ctx.clip();
            ctx.drawImage(currentPhoto, photoBoxX, photoBoxY, PHOTO_SIZE, PHOTO_SIZE);
            ctx.restore();
            
            // Double border (gold + white) – decorative only
            ctx.beginPath();
            roundedRect(ctx, photoBoxX, photoBoxY, PHOTO_SIZE, PHOTO_SIZE, cornerRadius);
            ctx.strokeStyle = "#FFD966";
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.beginPath();
            roundedRect(ctx, photoBoxX, photoBoxY, PHOTO_SIZE, PHOTO_SIZE, cornerRadius);
            ctx.strokeStyle = "#FFFFFF";
            ctx.lineWidth = 2.8;
            ctx.stroke();
        } else {
            // Empty placeholder (no text, just a subtle icon)
            ctx.fillStyle = "rgba(255, 248, 225, 0.92)";
            ctx.beginPath();
            roundedRect(ctx, photoBoxX, photoBoxY, PHOTO_SIZE, PHOTO_SIZE, cornerRadius);
            ctx.fill();
            ctx.fillStyle = "#c28a4b";
            ctx.font = "58px 'Anek Malayalam'";
            ctx.textAlign = "center";
            ctx.fillText("📷", photoBoxX + PHOTO_SIZE/2, photoBoxY + PHOTO_SIZE/2);
            ctx.textAlign = "left";
        }
        
        // 3. Name below photo (white, smaller font, no underline)
        let studentName = nameInput.value.trim();
        if (studentName === "") studentName = "__________";
        drawNameBelowPhoto(studentName);
        
        // Absolutely no other text or decorations.
    }
    
    // Helper: load cropped image
    function setPhotoFromDataURL(dataURL) {
        const img = new Image();
        img.onload = () => {
            currentPhoto = img;
            drawPoster();
        };
        img.src = dataURL;
    }
    
    // Crop handler (square) - shows cropper section at top of controls
    photoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            cropImage.src = ev.target.result;
            if (cropper) cropper.destroy();
            cropperSection.style.display = "block";
            cropper = new Cropper(cropImage, {
                aspectRatio: 1,
                viewMode: 2,
                autoCropArea: 0.9,
                cropBoxMovable: true,
                cropBoxResizable: true,
                zoomable: true,
                dragMode: 'move'
            });
        };
        reader.readAsDataURL(file);
    });
    
    applyCrop.addEventListener('click', () => {
        if (!cropper) return;
        const croppedCanvas = cropper.getCroppedCanvas({ width: 700, height: 700 });
        if (croppedCanvas) {
            setPhotoFromDataURL(croppedCanvas.toDataURL('image/png'));
        }
        cropperSection.style.display = "none";
        if (cropper) cropper.destroy();
        cropper = null;
        photoInput.value = '';
    });
    
    cancelCrop.addEventListener('click', () => {
        cropperSection.style.display = "none";
        if (cropper) cropper.destroy();
        cropper = null;
        photoInput.value = '';
    });
    
    nameInput.addEventListener('input', () => drawPoster());
    
    // Download button
    document.getElementById('downloadPosterBtn').addEventListener('click', () => {
        const rawName = (nameInput.value.trim() || 'poster').replace(/[^a-zA-Z0-9\u0D00-\u0D7F]/g, '_');
        const fileName = `GUPS_${rawName}.png`;
        const link = document.createElement('a');
        canvas.toBlob(blob => {
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            link.click();
            URL.revokeObjectURL(link.href);
        }, 'image/png');
    });
    
    // Load background
    background.crossOrigin = "Anonymous";
    background.onload = () => {
        bgReady = true;
        drawPoster();
    };
    background.onerror = () => {
        console.warn("Using gradient fallback");
        bgReady = true;
        drawPoster();
    };
    background.src = bgImageURL;
    
    drawPoster();
    window.addEventListener('resize', () => drawPoster());
    
    console.log("✅ Crop button section placed at top (after name input), preview heading below header, UI refined");
</script>
</body>
</html>

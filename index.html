<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GUPS PKDL SCHOOL | Praveshanothsavam</title>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.12/dist/cropper.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Anek Malayalam', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #142b44 0%, #1f4172 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .poster-studio {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .web-heading {
            text-align: center;
            padding: 22px 20px 0 20px;
            background: #fef8ef;
        }

        .web-heading h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72, #f7b32b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .studio-grid {
            display: flex;
            flex-wrap: wrap;
        }

        .controls-panel {
            flex: 1.2;
            min-width: 320px;
            background: #fef9f0;
            padding: 28px 24px;
            border-right: 1px solid #ffe0b5;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .preview-panel {
            flex: 1.8;
            background: #eef2fa;
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 700;
            color: #1e2f5e;
            font-size: 1.1rem;
        }

        input,
        .file-label {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1.5px solid #e2dccd;
            background: white;
            font-size: 1rem;
            outline: none;
        }

        .file-label {
            background: #f0e7d6;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .file-label:hover {
            background: #e5d9c2;
        }

        #photoInput {
            display: none;
        }

        .cropper-area {
            background: #fff6ea;
            border-radius: 32px;
            padding: 16px;
            border: 1px solid #ffdead;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn {
            border: none;
            background: #2c3e66;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            margin-right: 10px;
            transition: 0.2s;
        }

        .btn-primary {
            background: #f7b32b;
            color: #1e2f5e;
        }

        .poster-wrapper {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            display: flex;
            justify-content: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .download-btn {
            background: #1f8a4c;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .download-btn:hover {
            background: #0f6a3a;
            transform: scale(1.02);
        }

        .info-badge {
            font-size: 0.85rem;
            background: #e9ecf3;
            border-radius: 40px;
            padding: 10px 16px;
            text-align: center;
            color: #2c3e66;
        }

        @media (max-width: 850px) {
            .studio-grid {
                flex-direction: column;
            }

            .web-heading h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="poster-studio">
    <div class="web-heading">
        <h1>GUP SCHOOL PAZHAYAKADAKKAL</h1>
        <p>✨ പ്രവേശനോത്സവം 2026-27 ✨</p>
    </div>
    <div class="studio-grid">
        <div class="controls-panel">
            <div class="input-group">
                <label>📝 നിങ്ങളുടെ പേര് / Your Name</label>
                <input type="text" id="studentNameInput" placeholder="e.g. NIDHA/നിദ" autocomplete="off">
            </div>
            <div class="input-group">
                <label>📸 ഫോട്ടോ അപ്ലോഡ് ചെയ്യുക (photo size reduced on poster)</label>
                <div class="file-label" onclick="document.getElementById('photoInput').click()">📁 ഫോട്ടോ തിരഞ്ഞെടുക്കുക / Choose photo</div>
                <input type="file" id="photoInput" accept="image/*">
            </div>
            <div class="cropper-area" id="cropperSection" style="display: none;">
                <div class="cropper-title">✂️ ക്രോപ്പ് ചെയ്യുക (square crop)</div>
                <div id="cropImageContainer"><img id="cropImage" style="max-width:100%"></div>
                <div class="crop-actions" style="margin-top: 12px;">
                    <button class="btn btn-primary" id="applyCropBtn">✔️ ക്രോപ്പ് </button>
                    <button class="btn" id="cancelCropBtn">Cancel</button>
                </div>
            </div>
            <div class="info-badge">
                © SUHAIL KERALA
            </div>
        </div>
        <div class="preview-panel">
            <div class="poster-wrapper"><canvas id="posterCanvas" width="1200" height="1500"></canvas></div>
            <button id="downloadPosterBtn" class="download-btn">⬇️ പോസ്റ്റർ ഡൗൺലോഡ് ചെയ്യുക</button>
        </div>
    </div>
</div>

<script>
    // =======================
    // FIXED: NAME REPEATING ISSUE (removed duplicate text rendering)
    // Poster design: Background + Photo (reduced size 420px) + White Name (single clean layer)
    // No extra text, no underline, no duplicate drawing.
    // =======================

    const bgImageURL = 'https://i.ibb.co/0yXsZWnm/KERALA.jpg';
    const canvas = document.getElementById('posterCanvas');
    const ctx = canvas.getContext('2d');
    const nameInput = document.getElementById('studentNameInput');
    const photoInput = document.getElementById('photoInput');
    const cropperSection = document.getElementById('cropperSection');
    const cropImage = document.getElementById('cropImage');
    const applyCrop = document.getElementById('applyCropBtn');
    const cancelCrop = document.getElementById('cancelCropBtn');
    
    let cropper = null;
    let currentPhoto = null;          // HTMLImageElement of the cropped photo
    let background = new Image();
    let bgReady = false;
    
    // 🎨 PHOTO SIZE: REDUCED to 420px (as requested)
    const PHOTO_SIZE = 420;            
    const PHOTO_Y = 470;              // vertically balanced after reduction
    // X will be centered dynamically
    
    // Helper: rounded rectangle for photo frame
    function roundedRect(ctx, x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }
    
    // 🖼️ MAIN DRAW FUNCTION - renders exactly: Background + Photo (reduced) + WHITE NAME (single call, no duplication)
    function drawPoster() {
        if (!ctx) return;
        const w = canvas.width;    // 1200
        const h = canvas.height;   // 1500
        
        // 1. Draw background image (full poster background)
        if (bgReady && background.complete && background.naturalWidth) {
            ctx.drawImage(background, 0, 0, w, h);
        } else {
            // fallback gradient (rich and festive)
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#1e2f5e');
            grad.addColorStop(1, '#f7b32b');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
        }
        
        // 2. 📸 PHOTO SECTION - size REDUCED (420px)
        const photoX = (w - PHOTO_SIZE) / 2;
        const photoY = PHOTO_Y;
        const cornerRadius = 48;          // elegant rounded corners
        
        if (currentPhoto && currentPhoto.complete && currentPhoto.naturalWidth) {
            ctx.save();
            ctx.beginPath();
            roundedRect(ctx, photoX, photoY, PHOTO_SIZE, PHOTO_SIZE, cornerRadius);
            ctx.clip();
            ctx.drawImage(currentPhoto, photoX, photoY, PHOTO_SIZE, PHOTO_SIZE);
            ctx.restore();
            
            // ✨ Double border (gold + white) for premium look - only decorative, does NOT add text
            ctx.beginPath();
            roundedRect(ctx, photoX, photoY, PHOTO_SIZE, PHOTO_SIZE, cornerRadius);
            ctx.strokeStyle = "#FFD966";
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.beginPath();
            roundedRect(ctx, photoX, photoY, PHOTO_SIZE, PHOTO_SIZE, cornerRadius);
            ctx.strokeStyle = "#FFFFFF";
            ctx.lineWidth = 2.5;
            ctx.stroke();
        } else {
            // Empty photo placeholder (still uses reduced size area)
            ctx.fillStyle = "rgba(255,248,225,0.92)";
            ctx.beginPath();
            roundedRect(ctx, photoX, photoY, PHOTO_SIZE, PHOTO_SIZE, cornerRadius);
            ctx.fill();
            ctx.fillStyle = "#8b6946";
            ctx.font = "42px 'Anek Malayalam'";
            ctx.textAlign = "center";
            ctx.fillText("📷", photoX + PHOTO_SIZE/2, photoY + PHOTO_SIZE/2 - 25);
            ctx.font = "26px 'Anek Malayalam'";
            ctx.fillStyle = "#a5642e";
            ctx.fillText("ഫോട്ടോ അപ്ലോഡ് ചെയ്യുക", photoX + PHOTO_SIZE/2, photoY + PHOTO_SIZE/2 + 45);
            ctx.textAlign = "left";
        }
        
        // 3. 🏷️ STUDENT NAME - IN WHITE COLOUR (exact requirement) with clean shadow for contrast
        //    FIX: Only ONE fillText call to prevent repeating/ghosting effect.
        let studentName = nameInput.value.trim();
        if (studentName === "") studentName = "__________";
        
        // Dynamic font size to avoid overflow (max width approx 1000px)
        const maxNameWidth = w - 180;
        let fontSize = 74;
        ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
        while (ctx.measureText(studentName).width > maxNameWidth && fontSize > 32) {
            fontSize -= 4;
            ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
        }
        
        // Position name below the reduced photo (perfect spacing after reduction)
        const nameY = photoY + PHOTO_SIZE + 98;   
        
        // === WHITE TEXT WITH READABLE DARK SHADOW (single layer, no repetition) ===
        ctx.save();
        // Strong dark shadow ensures white text pops on any background
        ctx.shadowColor = "rgba(0, 0, 0, 0.85)";
        ctx.shadowBlur = 10;
        ctx.shadowOffsetX = 3;
        ctx.shadowOffsetY = 3;
        ctx.fillStyle = "#FFFFFF";               // ⭐ NAME IN PURE WHITE ⭐
        ctx.textAlign = "center";
        ctx.font = `bold ${fontSize}px 'Anek Malayalam'`;
        // ONE AND ONLY ONE fillText call - fixes the "NAME REPEATING IN TWO TIMES" issue
        ctx.fillText(studentName, w / 2, nameY);
        ctx.restore();
        
        // ❌ NO SECOND fillText, NO UNDERLINE, NO EXTRA TEXT, NO SCHOOL FOOTER
        // Poster stays minimal and elegant as requested.
        ctx.textAlign = "left";
    }
    
    // Helper: load cropped image and refresh poster
    function setPhotoFromDataURL(dataURL) {
        const img = new Image();
        img.onload = () => {
            currentPhoto = img;
            drawPoster();
        };
        img.src = dataURL;
    }
    
    // ---------- CROP LOGIC (Square 1:1) ----------
    photoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            cropImage.src = ev.target.result;
            if (cropper) cropper.destroy();
            cropperSection.style.display = "block";
            cropper = new Cropper(cropImage, {
                aspectRatio: 1,
                viewMode: 2,
                autoCropArea: 0.9,
                cropBoxMovable: true,
                cropBoxResizable: true,
                zoomable: true,
                dragMode: 'move'
            });
        };
        reader.readAsDataURL(file);
    });
    
    // Apply crop and update photo (high quality source, will be drawn at REDUCED 420px)
    applyCrop.addEventListener('click', () => {
        if (!cropper) return;
        const croppedCanvas = cropper.getCroppedCanvas({ width: 700, height: 700 }); // sharp source
        if (croppedCanvas) {
            setPhotoFromDataURL(croppedCanvas.toDataURL('image/png'));
        }
        cropperSection.style.display = "none";
        if (cropper) cropper.destroy();
        cropper = null;
        photoInput.value = '';   // reset file input to allow re-upload
    });
    
    cancelCrop.addEventListener('click', () => {
        cropperSection.style.display = "none";
        if (cropper) cropper.destroy();
        cropper = null;
        photoInput.value = '';
    });
    
    // Real-time name update (white colour draws instantly, no duplicate)
    nameInput.addEventListener('input', () => drawPoster());
    
    // 🖨️ Download high-quality poster PNG
    document.getElementById('downloadPosterBtn').addEventListener('click', () => {
        const rawName = (nameInput.value.trim() || 'poster').replace(/[^a-zA-Z0-9\u0D00-\u0D7F]/g, '_');
        const fileName = `GUPS_${rawName}_admission.png`;
        const link = document.createElement('a');
        canvas.toBlob(blob => {
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            link.click();
            URL.revokeObjectURL(link.href);
        }, 'image/png');
    });
    
    // Load background image (school theme)
    background.crossOrigin = "Anonymous";
    background.onload = () => {
        bgReady = true;
        drawPoster();
    };
    background.onerror = () => {
        console.warn("Using gradient fallback (bg image not loaded)");
        bgReady = true;
        drawPoster();
    };
    background.src = bgImageURL;
    
    // initial draw (empty photo, default name)
    drawPoster();
    
    // Redraw if needed on resize (canvas dimensions fixed, preview scales via CSS)
    window.addEventListener('resize', () => {
        drawPoster();
    });
    
    // console confirmation (silent success)
    console.log("✅ Poster Engine: PHOTO SIZE REDUCED to 420px | NAME in WHITE | FIXED: No duplicate text rendering");
</script>
</body>
</html>
